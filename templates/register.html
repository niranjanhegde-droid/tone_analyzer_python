{% extends "base.html" %}
{% block title %}Sign Up — ToneScope{% endblock %}
{% block content %}
<div class="card card-narrow">
  <h2 class="section-title">Create your account</h2>
  <p class="section-sub">Free to use — no credit card, no external AI API keys required.</p>
  <form method="POST">
    <div class="field">
      <label for="name">Full name</label>
      <input type="text" id="name" name="name" required autofocus placeholder="Jane Doe">
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required placeholder="you@example.com">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required placeholder="At least 6 characters">
    </div>
    <button type="submit" class="btn btn-primary btn-block">Create Account</button>
  </form>
  <div class="divider-text">Already have an account? <a href="{{ url_for('login') }}" class="link-accent">Log in</a></div>
</div>
{% endblock %}
